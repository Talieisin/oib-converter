version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-version:
        applies-to: version-updates
        patterns: ["*"]
      security:
        applies-to: security-updates
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      all-version:
        applies-to: version-updates
        patterns: ["*"]
      security:
        applies-to: security-updates
        patterns: ["*"]